name: Release Android APK

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;29.0.13846066"

      - name: Configure environment
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/29.0.13846066" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/29.0.13846066" >> $GITHUB_ENV

      - name: Restore signing keystore
        shell: bash
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

          cat > local.properties <<EOF
          KEYSTORE_FILE=release.keystore
          KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

          echo "local.properties created"

      - name: Grant execute permission
        run: |
          chmod +x gradlew
          chmod +x scripts/build-native-libs.sh
          chmod +x scripts/build-go-lib.sh

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Debug APK output
        shell: bash
        run: |
          echo "=== APK files ==="
          find app -type f -name "*.apk"

          echo
          echo "=== app/build ==="
          find app/build -maxdepth 5 -type f | sort

